name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8.15.4'

# Cancel in-progress runs on the same branch to avoid wasted minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Shared: lint + type-check ───────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # shared-types must be compiled before type-check runs (turbo: ^build)
      - name: Build workspace packages
        run: |
          pnpm --filter @pawn-stars/shared-types build
          pnpm --filter @pawn-stars/email-templates build

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

  # ─── API: build ──────────────────────────────────────────────────────────────
  build-api:
    name: Build — API
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: |
          pnpm --filter @pawn-stars/shared-types build
          pnpm --filter @pawn-stars/email-templates build

      - name: Build API
        run: pnpm --filter @pawn-stars/api build

      - name: Run API tests
        run: pnpm --filter @pawn-stars/api test --passWithNoTests
        env:
          NODE_ENV: test

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist
          retention-days: 7

  # ─── Web: build ───────────────────────────────────────────────────────────────
  build-web:
    name: Build — Web
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: |
          pnpm --filter @pawn-stars/shared-types build
          pnpm --filter @pawn-stars/email-templates build

      - name: Build Web
        run: pnpm --filter @pawn-stars/web build
        env:
          NODE_ENV: production
          # Stub public env vars so Next.js build doesn't fail without a live API
          NEXT_PUBLIC_API_URL: https://api.pawnstars.com
          NEXT_PUBLIC_WS_URL: wss://api.pawnstars.com

      - name: Upload .next artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-next
          path: apps/web/.next
          retention-days: 7
